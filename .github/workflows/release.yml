name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-ruff ruff

      - name: Lint
        run: ruff check server/ tests/

      - name: Test
        run: pytest

  build-windows:
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Extract version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Windows binary
        run: |
          pyinstaller `
            --onefile `
            --name pcb-copilot `
            --distpath dist `
            --workpath build `
            --add-data "manifest.json;." `
            --paths server `
            server/main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pcb-copilot-windows
          path: dist/pcb-copilot.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          files: dist/pcb-copilot.exe
          generate_release_notes: true

  build-macos-arm64:
    needs: test
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build macOS ARM64 binary
        run: |
          pyinstaller \
            --onefile \
            --name pcb-copilot-darwin-arm64 \
            --distpath dist \
            --workpath build \
            --add-data "manifest.json:." \
            --paths server \
            server/main.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          files: dist/pcb-copilot-darwin-arm64

  build-macos-x64:
    needs: test
    runs-on: macos-15-intel
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update manifest version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build macOS x64 binary
        run: |
          pyinstaller \
            --onefile \
            --name pcb-copilot-darwin-x64 \
            --distpath dist \
            --workpath build \
            --add-data "manifest.json:." \
            --paths server \
            server/main.py

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          files: dist/pcb-copilot-darwin-x64
